[project]
name = "spiri-docs"
version = "0.1.5"
description = "Sphinx extension for Spiri controlled documents: revision control, PDF document control, and build-time validation."
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
license-files = ["LICENSE"]
keywords = ["sphinx", "documentation", "technical-manual", "document-control"]
classifiers = [
    "Framework :: Sphinx :: Extension",
    "Programming Language :: Python :: 3",
    "Topic :: Documentation :: Sphinx",
]
dependencies = [
    "sphinx>=8",
    "pyyaml>=6",
]

[project.urls]
Homepage = "https://github.com/spiri-robotics/spiri-docs-tooling"
Source = "https://github.com/spiri-robotics/spiri-docs-tooling"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/spiri_docs"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
target-version = "py311"
line-length = 100

[dependency-groups]
dev = [
    "myst-parser>=5.1.0",
    "pytest>=8",
    "ruff>=0.6",
]
