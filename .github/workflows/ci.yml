name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: "3.13"
      - run: uv sync --all-groups
        working-directory: packages/spiri-docs
      - run: uv run ruff check .
        working-directory: packages/spiri-docs
      - run: uv run pytest
        working-directory: packages/spiri-docs

      # The version is written in three files that have to agree: the package
      # metadata, `__version__` (which goes into the Sphinx extension metadata),
      # and the template's exact pin. Nothing at build time catches a mismatch
      # -- a stale pin just resolves to an older extension and the document
      # builds without whatever conf.py was written against.
      - name: Check the version is consistent
        run: |
          python3 - <<'EOF'
          import pathlib, re, sys, tomllib

          root = pathlib.Path(".")
          package = tomllib.loads(
              (root / "packages/spiri-docs/pyproject.toml").read_text()
          )["project"]["version"]

          found = {"packages/spiri-docs/pyproject.toml": package}
          for path, pattern in (
              ("packages/spiri-docs/src/spiri_docs/__init__.py",
               r'__version__\s*=\s*"([^"]+)"'),
              ("template/pyproject.toml.jinja",
               r'"spiri-docs==([^"]+)"'),
          ):
              match = re.search(pattern, (root / path).read_text())
              found[path] = match.group(1) if match else None

          for path, version in found.items():
              print(f"{version or '(not found)':>12}  {path}")
          if len(set(found.values())) != 1 or None in found.values():
              print(f"::error::version mismatch; all three must read {package}")
              sys.exit(1)
          EOF

  template:
    # Generating a project and building its docs is the only test that covers
    # the template and the extension together, which is the pair that actually
    # ships. Both answer sets are exercised: the regulator path has validation
    # rules the customer path does not.
    runs-on: ubuntu-latest
    strategy:
      matrix:
        audience: [customer, regulator]
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: "3.13"

      - name: Generate a project
        run: |
          uvx copier copy --trust --defaults \
            --data audience=${{ matrix.audience }} \
            . /tmp/generated

      # VS Code ignores a malformed tasks.json or settings.json without saying
      # anything, so a typo here would silently remove the buttons contributors
      # rely on. Parse them (as JSONC -- they carry // comments) instead.
      - name: Validate editor configuration
        run: |
          python3 - <<'EOF'
          import json, re, pathlib, sys
          bad = False
          for f in sorted(pathlib.Path("/tmp/generated").glob(".vscode/*.json")) + \
                   sorted(pathlib.Path("/tmp/generated").glob(".devcontainer/*.json")):
              try:
                  json.loads(re.sub(r"^\s*//.*$", "", f.read_text(), flags=re.M))
              except Exception as exc:
                  print(f"::error file={f}::{exc}"); bad = True
          sys.exit(1 if bad else 0)
          EOF

      - name: Build its docs
        working-directory: /tmp/generated
        run: |
          uv add --group docs --editable "$GITHUB_WORKSPACE/packages/spiri-docs"
          uv sync --group docs
          uv run sphinx-build -b html -W docs docs/_build/html
