name: Publish

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8
        with:
          python-version: "3.13"

      - name: Build spiri-docs
        run: uv build --package spiri-docs --out-dir dist
        working-directory: packages/spiri-docs

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: packages/spiri-docs/dist

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      # Trusted publishing: PyPI verifies this workflow's identity, so there is
      # no API token to store or rotate. Configure the publisher at
      # https://pypi.org/manage/project/spiri-docs/settings/publishing/
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
